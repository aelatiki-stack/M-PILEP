<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Boîte à Merveilles - Chapitre 1</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    #app {
      width: 100%;
      height: 600px;
      margin-top: 60px;
      font-family: var(--font-sans);
      background: #0a0618;
      border-radius: 14px;
      overflow: hidden;
      user-select: none
    }

    #theater {
      position: relative;
      width: 100%;
      height: 360px;
      overflow: hidden;
      cursor: pointer
    }

    #bg-canvas {
      position: absolute;
      inset: 0
    }

    .char {
      position: absolute;
      bottom: 0;
      transition: transform 0.6s ease, left 0.6s ease, opacity 0.5s ease
    }

    .char svg {
      display: block
    }

    #bubble {
      position: absolute;
      background: #fffde8;
      border: 2px solid #c9a227;
      border-radius: 14px;
      padding: 10px 14px;
      max-width: 300px;
      font-size: 13px;
      line-height: 1.55;
      color: #3a2800;
      pointer-events: none;
      transition: opacity 0.4s ease;
      opacity: 0;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3)
    }

    #bubble::after {
      content: '';
      position: absolute;
      border: 8px solid transparent
    }

    #bubble.left::after {
      bottom: -16px;
      left: 20px;
      border-top-color: #c9a227
    }

    #bubble.right::after {
      bottom: -16px;
      right: 20px;
      border-top-color: #c9a227
    }

    #speaker {
      font-weight: 500;
      font-size: 12px;
      color: #7a4e00;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em
    }

    #scene-title {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.55);
      color: #f0c060;
      font-size: 13px;
      font-weight: 500;
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid rgba(200, 160, 50, 0.4);
      white-space: nowrap
    }

    #click-hint {
      position: absolute;
      bottom: 12px;
      right: 14px;
      color: rgba(255, 220, 100, 0.6);
      font-size: 11px;
      animation: blink 2s ease-in-out infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.4
      }

      50% {
        opacity: 1
      }
    }

    #bottom {
      background: #100c20;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap
    }

    .dot-nav {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(200, 160, 50, 0.25);
      border: 1px solid rgba(200, 160, 50, 0.5);
      cursor: pointer;
      transition: all 0.3s;
      flex-shrink: 0
    }

    .dot-nav.on {
      background: #c9a227;
      transform: scale(1.3)
    }

    #progress {
      flex: 1;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      min-width: 60px
    }

    #pbar {
      height: 100%;
      background: #c9a227;
      width: 0;
      transition: width 0.3s
    }

    #btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0
    }

    #btns button {
      background: rgba(200, 160, 50, 0.12);
      border: 0.5px solid rgba(200, 160, 50, 0.4);
      color: #c9a060;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 8px;
      cursor: pointer
    }

    #btns button:hover {
      background: rgba(200, 160, 50, 0.25)
    }

    #scene-num {
      font-size: 11px;
      color: rgba(200, 160, 80, 0.5);
      flex-shrink: 0
    }

    @keyframes zoom {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
      }
    }
  </style>

</head>

<body class="bg-[#f5efe6] font-sans text-[#1f3b73]">

  <!-- Navbar -->
  <header class="bg-[#1f4f99] text-white shadow-lg fixed top-0 left-0 w-full z-50">
    <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-2">

      <div class="flex items-center gap-3">
        <div class="bg-white p-2 rounded-xl text-2xl shadow-md"><img src="images/logo 1.png" alt="logo" width="140px">
        </div>
        <h1 class="text-2xl font-bold"></h1>
      </div>

      <nav class="hidden md:flex gap-8 text-lg font-medium">
        <a href="index.html" class="hover:text-yellow-300 transition">Accueil</a>
        <a href="cours.html" class="hover:text-yellow-300 transition">Cours</a>
        <a href="Q&R.html" class="hover:text-yellow-300 transition">Q&R</a>
        <a href="slide.html" class="hover:text-yellow-300 transition">Video</a>
        <a href="chatbot.html" class="hover:text-yellow-300 transition">ChatBot</a>
      </nav>
    </div>
  </header>


  <!-- PAGE QUESTIONS -->
  <section class="max-w-6xl mx-auto px-6 py-20">

    <div id="app">
      <div id="theater">
        <canvas id="bg-canvas"></canvas>
        <div class="char" id="c-ahmed" style="left:60px;bottom:0;opacity:0"></div>
        <div class="char" id="c-mere" style="left:400px;bottom:0;opacity:0"></div>
        <div class="char" id="c-zineb" style="left:500px;bottom:0;opacity:0"></div>
        <div class="char" id="c-lalla" style="left:300px;bottom:0;opacity:0"></div>
        <div id="bubble">
          <div id="speaker"></div>
          <div id="btext"></div>
        </div>
        <div id="scene-title">Scène 1</div>
        <div id="click-hint">Cliquer pour continuer</div>
      </div>
      <div id="bottom">
        <div id="btns">
          <button onclick="prev()">&#8592;</button>
          <button onclick="next()">&#8594;</button>
        </div>
        <div id="progress">
          <div id="pbar"></div>
        </div>
        <div id="dots"></div>
        <div id="scene-num">1/6</div>
      </div>
    </div>
  </section>

<!-- Footer -->
  <footer class="bg-[#163b74] text-white text-center py-8">
    <p class="text-lg">
      © 2026 - Site éducatif | Master- Pédagogie Innovante de l'Enseignement Primaire<br>
      Créé par : -EL ATIKI AYYOUB | Zaid KHANNOUS | ENNABAOUI HANANE | OUFTIH RAJAE |
    </p>
    <div class="md:flex gap-8 text-lg font-medium">
        <a href="index.html" class="hover:text-yellow-300 transition">Accueil</a>
        <a href="cours.html" class="hover:text-yellow-300 transition">Cours</a>
        <a href="Q&R.html" class="hover:text-yellow-300 transition">Q&R</a>
        <a href="slide.html" class="hover:text-yellow-300 transition">Video</a>
        <a href="chatbot.html" class="hover:text-yellow-300 transition">ChatBot</a>
    </div>
  </footer>


  <script>
    const W = 680, H = 360;
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = W; canvas.height = H;

    function drawBg(scene) {
      ctx.clearRect(0, 0, W, H);
      if (scene === 0) {
        ctx.fillStyle = '#0d0525'; ctx.fillRect(0, 0, W, H);
        for (let i = 0; i < 60; i++) {
          ctx.beginPath(); ctx.arc(Math.random() * W, Math.random() * H * 0.6, Math.random() * 1.5 + 0.3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,200,${Math.random() * 0.6 + 0.2})`; ctx.fill();
        }
        ctx.fillStyle = '#f5e8b0'; ctx.beginPath(); ctx.arc(600, 55, 28, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(245,232,176,0.3)'; ctx.beginPath(); ctx.arc(600, 55, 40, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#1a0a3e';
        for (let h of [[20, 200, 60, H], [90, 160, 80, H], [200, 140, 100, H], [340, 150, 90, H], [460, 170, 70, H], [560, 185, 60, H]]) {
          ctx.fillRect(h[0], h[1], h[2], h[3]);
          for (let w = 0; w < 3; w++) { ctx.fillStyle = 'rgba(201,162,39,0.35)'; ctx.fillRect(h[0] + 8 + w * 18, h[1] + 20, 10, 12); }
          ctx.fillStyle = '#1a0a3e';
        }
        ctx.fillStyle = '#2a1256'; ctx.fillRect(0, 300, W, H);
      } else if (scene === 1) {
        ctx.fillStyle = '#1a0e30'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#0d0820'; ctx.fillRect(0, 260, W, H);
        ctx.fillStyle = '#2a1a50'; ctx.fillRect(0, 240, W, 20);
        for (let i = 0; i < 30; i++) { ctx.beginPath(); ctx.arc(Math.random() * W, Math.random() * 200, 0.8, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,255,220,0.5)'; ctx.fill(); }
        ctx.fillStyle = '#3d1a6e'; ctx.fillRect(240, 100, 180, 260);
        ctx.fillStyle = '#2a1256'; ctx.fillRect(250, 88, 160, 20);
        for (let x = 0; x < 4; x++) { ctx.fillStyle = 'rgba(201,162,39,0.4)'; ctx.fillRect(258 + x * 36, 115, 22, 28); }
        ctx.fillStyle = '#1e0d40'; ctx.fillRect(300, 200, 60, 160);
        ctx.fillStyle = '#c9a22740'; ctx.fillRect(248, 145, 25, 18); ctx.fillRect(385, 145, 25, 18);
        ctx.fillStyle = 'rgba(255,200,80,0.08)'; ctx.fillRect(295, 195, 70, 165);
      } else if (scene === 2) {
        ctx.fillStyle = '#f4ede0'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#e8dcc8'; ctx.fillRect(0, 280, W, H);
        ctx.fillStyle = '#d4c4a0'; ctx.fillRect(0, 275, W, 8);
        ctx.fillStyle = '#c8b48c'; ctx.fillRect(0, 250, W, 28);
        ctx.fillStyle = '#b8a07a';
        for (let i = 0; i < W; i += 12) { ctx.fillRect(i, 250, 10, 28); }
        ctx.fillStyle = '#e8dcc0'; ctx.fillRect(50, 80, 200, 250);
        ctx.fillStyle = '#d4c4a4'; ctx.fillRect(60, 68, 180, 20);
        ctx.fillStyle = '#8B6914'; ctx.fillRect(130, 180, 50, 150);
        for (let x = 0; x < 3; x++)for (let y = 0; y < 2; y++) { ctx.fillStyle = 'rgba(140,190,220,0.6)'; ctx.fillRect(62 + x * 60, 90 + y * 70, 40, 55); }
        ctx.fillStyle = '#c8a070'; ctx.fillRect(400, 120, 200, 240);
        ctx.fillStyle = '#b89060'; ctx.fillRect(408, 108, 184, 18);
      } else if (scene === 3) {
        ctx.fillStyle = '#fff8f0'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ede0cc'; ctx.fillRect(0, 280, W, H);
        ctx.fillStyle = '#f5e8d0'; ctx.fillRect(60, 60, 560, 220);
        ctx.strokeStyle = '#c8a870'; ctx.lineWidth = 1; ctx.strokeRect(60, 60, 560, 220);
        ctx.fillStyle = '#e8d8b8'; ctx.fillRect(80, 80, 520, 180);
        for (let i = 0; i < 8; i++) { ctx.fillStyle = `rgba(180,140,80,${0.05 + i * 0.02})`; ctx.fillRect(80 + i * 10, 80 + i * 8, 520 - i * 20, 180 - i * 16); }
      } else if (scene === 4 || scene === 5) {
        ctx.fillStyle = '#1a1030'; ctx.fillRect(0, 0, W, H);
        for (let i = 0; i < 50; i++) { ctx.beginPath(); ctx.arc(Math.random() * W, Math.random() * H * 0.7, Math.random() * 1.2 + 0.2, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,255,200,${Math.random() * 0.5 + 0.1})`; ctx.fill(); }
        ctx.fillStyle = '#f5e8b0'; ctx.beginPath(); ctx.arc(340, 50, 22, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#0d0820'; ctx.fillRect(0, 260, W, H);
      }
    }

    function makePerson(type, flip) {
      const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      s.setAttribute('width', '70'); s.setAttribute('height', '160');
      s.setAttribute('viewBox', '0 0 70 160');
      const t = flip ? 'scale(-1,1) translate(-70,0)' : '';
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      if (t) g.setAttribute('transform', t);

      const cfg = {
        ahmed: { skin: '#c8956c', hair: '#2a1a0a', robe: '#2a4a7a', hood: '#1a3060', beard: 'none', wrap: '#c9a227', acc: 'none' },
        mere: { skin: '#c07848', hair: '#1a0a0a', robe: '#8b2040', hood: '#6a1030', beard: 'none', wrap: '#d4405a', acc: 'haik' },
        zineb: { skin: '#d4a070', hair: '#1a0a0a', robe: '#2a6a3a', hood: '#1a4a28', beard: 'none', wrap: '#50b060', acc: 'none' },
        lalla: { skin: '#b87040', hair: '#1a0a0a', robe: '#60208a', hood: '#40106a', beard: 'none', wrap: '#9040c0', acc: 'haik' },
        driss: { skin: '#a06030', hair: '#1a0a0a', robe: '#3a3a3a', hood: 'none', beard: '#1a0a0a', wrap: 'none', acc: 'none' }
      }[type] || { skin: '#c8956c', hair: '#2a1a0a', robe: '#4a2a6a', hood: '#3a1a50', beard: 'none', wrap: 'none', acc: 'none' };

      const add = (tag, attrs) => { const e = document.createElementNS('http://www.w3.org/2000/svg', tag); for (const k in attrs) e.setAttribute(k, attrs[k]); g.appendChild(e); return e; };

      add('ellipse', { cx: 35, cy: 30, rx: 14, ry: 16, fill: cfg.skin });
      if (cfg.hair !== 'none') add('ellipse', { cx: 35, cy: 20, rx: 14, ry: 10, fill: cfg.hair });
      if (cfg.hood !== 'none') { add('path', { d: 'M20 22 Q35 5 50 22 Q52 35 50 40 L20 40 Q18 35 20 22', fill: cfg.hood }); }
      if (cfg.beard !== 'none') add('ellipse', { cx: 35, cy: 42, rx: 8, ry: 5, fill: cfg.beard });
      add('rect', { x: 18, y: 44, width: 34, height: 80, fill: cfg.robe, rx: 4 });
      if (cfg.acc === 'haik') { add('ellipse', { cx: 35, cy: 48, rx: 18, ry: 6, fill: cfg.wrap, opacity: 0.85 }); }
      add('line', { x1: 18, y1: 60, x2: 5, y2: 100, stroke: cfg.robe, 'stroke-width': 10, 'stroke-linecap': 'round' });
      add('line', { x1: 52, y1: 60, x2: 65, y2: 100, stroke: cfg.robe, 'stroke-width': 10, 'stroke-linecap': 'round' });
      add('line', { x1: 26, y1: 124, x2: 20, y2: 155, stroke: '#2a1a0a', 'stroke-width': 8, 'stroke-linecap': 'round' });
      add('line', { x1: 44, y1: 124, x2: 50, y2: 155, stroke: '#2a1a0a', 'stroke-width': 8, 'stroke-linecap': 'round' });
      if (cfg.wrap !== 'none' && cfg.acc !== 'haik') {
        add('rect', { x: 14, y: 55, width: 42, height: 6, fill: cfg.wrap, rx: 3 });
      }
      s.appendChild(g);
      return s;
    }

    const chars = {
      ahmed: document.getElementById('c-ahmed'),
      mere: document.getElementById('c-mere'),
      zineb: document.getElementById('c-zineb'),
      lalla: document.getElementById('c-lalla')
    };

    ['ahmed', 'mere', 'zineb', 'lalla'].forEach(id => {
      const flip = id === 'mere' || id === 'lalla';
      chars[id].appendChild(makePerson(id, flip));
    });

    const bubble = document.getElementById('bubble');
    const btext = document.getElementById('btext');
    const speaker = document.getElementById('speaker');
    const sceneTitle = document.getElementById('scene-title');

    const SCENES = [
      {
        title: 'Scène 1 — La nuit à Fès',
        bg: 0,
        chars: { ahmed: { left: '80px', opacity: 1 }, mere: { left: '420px', opacity: 0 }, zineb: { left: '500px', opacity: 0 }, lalla: { left: '320px', opacity: 0 } },
        speech: { who: 'ahmed', side: 'left', left: '130px', top: '60px', text: 'Je m\'appelle Sidi Mohammed. Je suis un enfant solitaire dans le vieux Fès... Cette nuit, je contemple le ciel étoilé depuis notre maison du Derb Nouara.' }
      },
      {
        title: 'Scène 2 — La maison',
        bg: 1,
        chars: { ahmed: { left: '80px', opacity: 1 }, mere: { left: '400px', opacity: 1 }, zineb: { left: '500px', opacity: 0 }, lalla: { left: '300px', opacity: 0 } },
        speech: { who: 'mere', side: 'right', left: '150px', top: '50px', text: 'Notre maison est grande, avec un patio central. Lalla Zoubida, ma mère, règne sur ce foyer. Elle est douce mais elle sait se faire respecter de tous.' }
      },
      {
        title: 'Scène 3 — Derb Nouara',
        bg: 2,
        chars: { ahmed: { left: '100px', opacity: 1 }, mere: { left: '350px', opacity: 1 }, zineb: { left: '470px', opacity: 1 }, lalla: { left: '290px', opacity: 0 } },
        speech: { who: 'zineb', side: 'right', left: '100px', top: '45px', text: 'Zineb est ma voisine et mon amie. Nous partageons les mêmes ruelles. Mais je préfère souvent rester seul, à rêver, plutôt que de jouer avec les autres enfants.' }
      },
      {
        title: 'Scène 4 — La boîte',
        bg: 3,
        chars: { ahmed: { left: '90px', opacity: 1 }, mere: { left: '400px', opacity: 0 }, zineb: { left: '480px', opacity: 0 }, lalla: { left: '300px', opacity: 0 } },
        speech: { who: 'ahmed', side: 'left', left: '150px', top: '55px', text: 'Ma boîte à merveilles est mon trésor secret. Elle contient des billes de verre, des coquillages, des boutons colorés... Chaque objet me raconte une histoire que moi seul je peux entendre.' }
      },
      {
        title: 'Scène 5 — Lalla Aicha',
        bg: 4,
        chars: { ahmed: { left: '80px', opacity: 1 }, mere: { left: '420px', opacity: 1 }, zineb: { left: '500px', opacity: 0 }, lalla: { left: '310px', opacity: 1 } },
        speech: { who: 'lalla', side: 'right', left: '100px', top: '50px', text: 'Lalla Aicha est notre voisine distinguée. Elle visite souvent notre maison. Sa présence remplit la pièce d\'un parfum de musc et de paroles mystérieuses sur la vie et le destin.' }
      },
      {
        title: 'Scène 6 — La mémoire',
        bg: 0,
        chars: { ahmed: { left: '80px', opacity: 1 }, mere: { left: '400px', opacity: 1 }, zineb: { left: '490px', opacity: 1 }, lalla: { left: '310px', opacity: 1 } },
        speech: { who: 'ahmed', side: 'left', left: '150px', top: '45px', text: 'Des années plus tard, adulte, je me souviens de tout. Ahmed Sefrioui, l\'auteur, écrit pour ne pas oublier. Cette boîte à merveilles, c\'est ma mémoire, mon âme d\'enfant à Fès.' }
      }
    ];

    let cur = 0;
    let typing = null;

    function showScene(n) {
      cur = n;
      const sc = SCENES[n];
      drawBg(sc.bg);
      sceneTitle.textContent = sc.title;
      document.getElementById('scene-num').textContent = (n + 1) + '/' + SCENES.length;
      document.querySelectorAll('.dot-nav').forEach((d, i) => { d.classList.toggle('on', i === n); });
      document.getElementById('pbar').style.width = ((n + 1) / SCENES.length * 100) + '%';

      for (const id in sc.chars) {
        const c = sc.chars[id];
        chars[id].style.left = c.left;
        chars[id].style.opacity = c.opacity;
      }

      bubble.style.opacity = 0;
      if (typing) clearTimeout(typing);

      setTimeout(() => {
        const sp = sc.speech;
        const bub = bubble;
        bub.className = '';
        bub.classList.add(sp.side);
        bub.style.left = sp.left;
        bub.style.top = sp.top;
        speaker.textContent = sp.who === 'ahmed' ? 'Sidi Mohammed (narrateur)' : sp.who === 'mere' ? 'Lalla Zoubida (mère)' : sp.who === 'zineb' ? 'Zineb (voisine)' : 'Lalla Aicha (voisine)';
        btext.textContent = '';
        bub.style.opacity = 1;
        let i = 0; const txt = sp.text;
        function type() { if (i < txt.length) { btext.textContent += txt[i++]; typing = setTimeout(type, 18); } };
        type();
      }, 400);
    }

    function next() { showScene((cur + 1) % SCENES.length); }
    function prev() { showScene((cur - 1 + SCENES.length) % SCENES.length); }

    document.getElementById('theater').addEventListener('click', next);

    const dotsEl = document.getElementById('dots');
    SCENES.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot-nav' + (i === 0 ? ' on' : '');
      d.addEventListener('click', e => { e.stopPropagation(); showScene(i); });
      dotsEl.appendChild(d);
    });

    showScene(0);

    function toggleAnswer(id) {
      const answer = document.getElementById(id);

      answer.classList.toggle('hidden');
    }

  </script>

</body>
